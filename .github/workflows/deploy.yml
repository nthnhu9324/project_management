name: Deploy Astro site to GitHub Pages

on:
  # Tự động chạy quy trình khi có code mới đẩy lên nhánh main
  push:
    branches: [ main ]
  # Cho phép kích hoạt quy trình thủ công từ tab Actions
  workflow_dispatch:

# Cấp quyền cần thiết để Action có thể build và deploy lên Github Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22 # Phiên bản Node.js sử dụng để build
          # package-manager: npm # Mặc định tự động nhận diện theo package-lock.json

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
